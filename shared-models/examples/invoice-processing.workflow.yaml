# invoice-processing.workflow.yaml
# Example: Document processing pipeline with extraction and human review.
# Exercises: file_upload, llm_call, human_review

name: Invoice Processing Pipeline
description: Extract data from uploaded invoices and route for approval
version: 1
tags:
  - finance
  - document-processing

nodes:
  upload:
    type: file_upload
    execution_mode: INPUT
    label: Upload Invoice
    config:
      acceptedFormats: [pdf, png, jpg]
      maxFileSize: 10485760  # 10MB

  extract:
    type: llm_call
    execution_mode: MESSAGES
    label: Extract Invoice Fields
    config:
      model: us.anthropic.claude-sonnet-4-20250514-v1:0
      temperature: 0.0
      maxTokens: 1024
      template: |
        Extract the following fields from this invoice document:
        {{upload.output.text}}

        Return a JSON object with these fields:
        - vendor_name (string, required)
        - invoice_number (string, required)
        - total_amount (number, required)
        - line_items (array of objects, optional)

        Respond with only the JSON object.

  classify:
    type: llm_call
    execution_mode: MESSAGES
    label: Classify Invoice
    config:
      model: us.anthropic.claude-sonnet-4-20250514-v1:0
      temperature: 0.0
      maxTokens: 200
      template: |
        Given the following invoice data:
        {{extract.output.text}}

        Classify this invoice into one of: SUPPLIES, SERVICES, EQUIPMENT, OTHER.
        Respond with only the category name.

  review:
    type: human_review
    execution_mode: FLOW
    label: Manager Approval
    config:
      review_prompt: >
        Review the extracted invoice data and classification.
        Approve if data looks correct, reject to re-process.
      timeoutMinutes: 1440  # 24 hours
      allowApprove: true
      allowReject: true
      allowEdit: false

edges:
  - from: upload
    to: extract
  - from: extract
    to: classify
  - from: classify
    to: review

entry: upload
exit: review
