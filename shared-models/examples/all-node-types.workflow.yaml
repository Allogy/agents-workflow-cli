# all-node-types.workflow.yaml
# Example: Exercises all supported WDF node types in a single workflow.
# This is a reference/test file — not a realistic workflow.
#
# Node types covered (11 CLI-supported):
#   1. plain_txt_input    6. llm_call           11. memory_file_url
#   2. structured_input   7. structured_output
#   3. file_upload        8. retrieve
#   4. agent              9. human_review
#   5. rag_agent         10. api_consumption
#
# Note: document_extraction is in the WDF schema but not CLI-supported.

name: All Node Types Reference
description: A reference workflow exercising every supported WDF node type
version: 1
tags:
  - reference
  - testing

nodes:
  # --- Input Nodes ---
  text_input:
    type: plain_txt_input
    execution_mode: INPUT
    label: Free Text Input
    config:
      placeholder: "Enter your question here..."

  form_input:
    type: structured_input
    execution_mode: INPUT
    label: Customer Details Form
    config:
      schema:
        type: object
        required: [name, email]
        properties:
          name:
            type: string
            minLength: 1
          email:
            type: string
            format: email
          phone:
            type: string

  file_input:
    type: file_upload
    execution_mode: INPUT
    label: Upload Document
    config:
      acceptedFormats: [pdf, docx, png, jpg]
      maxFileSize: 10485760

  # --- Processing Nodes ---
  agent_node:
    type: agent
    execution_mode: MESSAGES
    label: Research Agent
    config:
      agent_name: YOUR_AGENT_NAME
      primaryInput: "{{text_input.output.text}}"
      # Optional flags:
      # use_rlm: true             # route through the RLM (beta) runner
      # max_iterations: 20        # RLM loop budget per node (1-100, default 20)
      # web_tools_enabled: true   # attach web_search / web_fetch tools

  rag_node:
    type: rag_agent
    execution_mode: MESSAGES
    label: Knowledge Base Agent
    config:
      agent_name: YOUR_AGENT_NAME
      knowledge_base_names:
        - YOUR_KNOWLEDGE_BASE_NAME

  search_node:
    type: retrieve
    execution_mode: FLOW
    label: Search Knowledge Base
    config:
      knowledge_base_name: YOUR_KNOWLEDGE_BASE_NAME
      topK: 5
      scoreThreshold: 0.7
      enableReranking: false
      includeMetadata: true

  llm_node:
    type: llm_call
    execution_mode: MESSAGES
    label: Classify and Summarize
    config:
      model: us.anthropic.claude-sonnet-4-20250514-v1:0
      temperature: 0.3
      maxTokens: 2048
      template: |
        Given the user input: {{text_input.output.text}}
        And the agent analysis: {{agent_node.output.response}}

        Provide a classification and brief summary.

  output_node:
    type: structured_output
    execution_mode: OUTPUT
    label: Format Response
    config:
      model: us.anthropic.claude-sonnet-4-20250514-v1:0
      schema:
        type: object
        properties:
          summary:
            type: string
          confidence:
            type: number
          category:
            type: string

  # --- Integration Nodes ---
  api_node:
    type: api_consumption
    execution_mode: MESSAGES
    label: Query External API
    config:
      connectorId: "00000000-0000-0000-0000-0000000000c0"
      primaryInput: "{{text_input.output.text}}"
      maxRecursionDepth: 1
      operationHint: getSales
      timeoutSeconds: 30

  # --- Human Interaction Nodes ---
  review_node:
    type: human_review
    execution_mode: FLOW
    label: Manager Approval
    config:
      review_prompt: >
        Review the extracted data and classification results.
        Approve to proceed or reject to re-process.
      timeoutMinutes: 1440
      allowApprove: true
      allowReject: true
      allowEdit: false

  memory_url_node:
    type: memory_file_url
    execution_mode: OUTPUT
    label: API Response Download Link
    config:
      # In production, path usually templates an upstream memory_file_path, e.g.:
      # path: "{{api_node.output.memory_file_path}}"
      path: exports/reference-response.json

edges:
  # Main path: text_input -> agent -> rag -> llm -> output -> review
  - from: text_input
    to: agent_node
    type: CONDITIONAL
    condition: route == "agent"
  - from: agent_node
    to: rag_node
  - from: rag_node
    to: llm_node
  # Branching paths from text_input to exercise all input types
  - from: text_input
    to: form_input
    type: CONDITIONAL
    condition: route == "form"
  - from: text_input
    to: file_input
    type: CONDITIONAL
    condition: route == "file"
  # Parallel inputs feed into llm_node
  - from: form_input
    to: search_node
  - from: search_node
    to: llm_node
  - from: file_input
    to: llm_node
  # Output path
  - from: llm_node
    to: output_node
  - from: output_node
    to: review_node
  # Integration branch: text_input -> api_node -> review_node
  - from: text_input
    to: api_node
    type: CONDITIONAL
    condition: route == "api"
  - from: api_node
    to: memory_url_node
  - from: memory_url_node
    to: review_node

entry: text_input
exit: review_node
