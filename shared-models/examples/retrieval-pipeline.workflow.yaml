# retrieval-pipeline.workflow.yaml
# WDF equivalent of: backend/scripts/workflow_complete_tests/payloads/retrieval_pipeline.json
# Pattern: STRUCTURED_INPUT -> RETRIEVE -> LLM_CALL (extract) -> LLM_CALL (summarize) -> STRUCTURED_OUTPUT (5-node)

name: Retrieval Pipeline
description: 5-node retrieval workflow — form input, vector search, content extraction, LLM summarization, structured output
version: 1
tags:
  - test
  - retrieve
  - llm-extraction

nodes:
  search_form:
    type: structured_input
    execution_mode: INPUT
    label: Search Query
    config:
      schema:
        type: object
        properties:
          query:
            title: Search Query
            type: string
          max_results:
            title: Max Results
            type: integer
            default: 5
        required:
          - query

  vector_search:
    type: retrieve
    execution_mode: FLOW
    label: Vector Search
    config:
      knowledge_base_name: YOUR_KNOWLEDGE_BASE_NAME
      topK: 5
      scoreThreshold: 0.7
      enableReranking: false
      includeMetadata: true

  content_extractor:
    type: llm_call
    execution_mode: MESSAGES
    label: Content Extractor
    config:
      model: us.anthropic.claude-sonnet-4-20250514-v1:0
      temperature: 0.0
      maxTokens: 2048
      template: |
        Extract and organize the key content from these retrieved documents:
        {{vector_search.output.results}}

        Include any tables, structured data, and important details.
        Present the content in a clear, organized format.

  summarizer:
    type: llm_call
    execution_mode: MESSAGES
    label: Summarizer
    config:
      model: us.anthropic.claude-sonnet-4-20250514-v1:0
      temperature: 0.5
      maxTokens: 2048
      template: "Based on the retrieved documents, provide a comprehensive summary:\n{{content_extractor.output.text}}"

  search_results:
    type: structured_output
    execution_mode: OUTPUT
    label: Search Results
    config:
      schema:
        type: object
        properties: {}
        required: []
        additionalProperties: false

edges:
  - from: search_form
    to: vector_search
  - from: vector_search
    to: content_extractor
  - from: content_extractor
    to: summarizer
  - from: summarizer
    to: search_results

entry: search_form
exit: search_results
