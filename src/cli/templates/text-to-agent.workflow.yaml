# text-to-agent.workflow.yaml
# Template: Plain text -> Agent
# The simplest agent workflow: free-text input processed by an agent.

name: Text to Agent
description: Plain text input routed directly to an agent
version: 1
tags:
  - template
  - agent

nodes:
  user_input:
    type: plain_txt_input
    execution_mode: INPUT
    label: Enter Your Message
    config:
      placeholder: Type your message here...

  agent:
    type: agent
    execution_mode: MESSAGES
    label: Assistant Agent
    config:
      agent_name: YOUR_AGENT_NAME
      primaryInput: "{{user_input.output.text}}"

edges:
  - from: user_input
    to: agent

entry: user_input
exit: agent
